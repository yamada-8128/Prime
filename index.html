<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>素数アキネーター＆図鑑</title>
  
  <link rel="stylesheet" href="style.css?v=1">

  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<div class="container">
  <header>
    <h1>素数アキネーター＆図鑑</h1>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('akinator')">アキネーター</button>
    <button class="tab-btn" onclick="switchTab('zukan')">素数図鑑</button>
  </div>

  <div id="akinator" class="panel active">
    
    <div class="setting-group">
      <label for="digit-select" style="font-size: 0.9rem; color: var(--text-muted); font-weight: bold;">出題される素数の桁数:</label>
      <select id="digit-select" onchange="resetGame()" style="margin-bottom: 5px;">
        <option value="any">指定なし (10000以下)</option>
        <option value="2">2桁 (11 〜 97)</option>
        <option value="3">3桁 (101 〜 997)</option>
        <option value="4">4桁 (1009 〜 9973)</option>
      </select>
    </div>

    <p id="target-info" style="font-size: 0.9rem; color: var(--text-muted); text-align: center;">
      素数を1つ決定しました。質問をして数を絞り込んでください！
    </p>

    <select id="question-select"></select>
    <button onclick="askQuestion()">質問する</button>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <input type="number" id="guess-input" placeholder="素数を当てる（例: 3511）">
      <button onclick="guessPrime()" style="flex-shrink: 0; width: auto;">回答</button>
    </div>
    
    <div id="result-message"></div>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
      <button onclick="showAnswer()" class="btn-secondary">降参して答えを見る</button>
      <button onclick="resetGame()" class="btn-muted">新しい素数にする</button>
    </div>

    <div id="history-log">
      <div style="font-weight: bold; margin-bottom: 10px;">質問履歴</div>
      </div>
  </div>

  <div id="zukan" class="panel">
    <div id="zukan-list">
      </div>
  </div>
</div>

<script src="script.js?v=1"></script>
</body>
</html>
